# QEMU Configuration for Zonix OS - UEFI Mode
# Usage: qemu-system-x86_64 -bios OVMF.fd -readconfig qemu-uefi.cfg
#
# Pure AHCI configuration - like real hardware

[machine]
type = "pc"

[memory]
size = "256M"

[boot-opts]
order = "c"

# AHCI Controller
[device "ahci0"]
driver = "ahci"

# Port 0: system disk (GPT + ESP)
[drive "ahci-sys"]
file = "bin/zonix-uefi.img"
format = "raw"
if = "none"

[device "ahci-hd0"]
driver = "ide-hd"
bus = "ahci0.0"
drive = "ahci-sys"
bootindex = "0"

# Port 1: user data disk (FAT32, user programs)
[drive "ahci-data"]
file = "bin/userdata.img"
format = "raw"
if = "none"

[device "ahci-hd1"]
driver = "ide-hd"
bus = "ahci0.1"
drive = "ahci-data"

[chardev]
backend = "stdio"
id = "char0"

[device]
driver = "isa-serial"
chardev = "char0"
