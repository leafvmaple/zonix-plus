# QEMU Configuration for Zonix OS — UEFI + AHCI (default)
#
# System disk on AHCI port 0.  User-data disk is attached by the
# Makefile via command-line flags (AHCI port 1 or IDE, see DISK= option).
#
# Usage: make qemu  (or: make qemu DISK=ide)

[machine]
type = "pc"

[memory]
size = "256M"

# AHCI Controller
[device "ahci0"]
driver = "ahci"

# Port 0: system disk (GPT + ESP)
[drive "ahci-sys"]
file = "bin/x86/zonix-uefi.img"
format = "raw"
if = "none"

[device "ahci-hd0"]
driver = "ide-hd"
bus = "ahci0.0"
drive = "ahci-sys"
bootindex = "0"

# Serial console
[chardev]
backend = "stdio"
id = "char0"

[device]
driver = "isa-serial"
chardev = "char0"
