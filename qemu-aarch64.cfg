# QEMU Configuration for Zonix OS - AArch64 (virt machine)
# Usage: qemu-system-aarch64 -M virt -cpu cortex-a72 -m 256M -nographic -kernel bin/kernel
#
# The 'virt' machine provides:
#   - PL011 UART at 0x0900_0000
#   - GICv2 interrupt controller
#   - virtio-mmio transports
#   - No BIOS/UEFI needed — kernel loaded directly via -kernel
