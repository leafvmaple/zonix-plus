# QEMU Configuration for Zonix OS — AArch64 UEFI
#
# Disk configuration only.  Machine, memory, CPU, and serial
# are set on the command line (see arch/aarch64/Makefile).
#
# Usage: make qemu ARCH=aarch64

# virtio-blk: system disk (GPT + ESP)
[drive "sys"]
file = "bin/aarch64/zonix-uefi.img"
format = "raw"
if = "none"

[device "virtio-blk0"]
driver = "virtio-blk-pci"
drive = "sys"

# Display: ramfb (provides GOP for UEFI firmware)
[device "display"]
driver = "ramfb"
