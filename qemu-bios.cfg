# QEMU Configuration for Zonix OS — BIOS + IDE (fallback)
#
# System disk on IDE.  AHCI controller present for user-data disk,
# which is attached by the Makefile via command-line flags.
#
# Usage: make qemu-bios  (or: make qemu-bios DISK=ide)

[machine]
type = "pc"

[memory]
size = "128M"

[boot-opts]
order = "c"

# Primary IDE disk (hda) — main system disk
[drive]
file = "bin/x86/zonix.img"
format = "raw"
if = "ide"
index = "0"
media = "disk"
locking = "off"

# AHCI Controller (for user-data disk, attached via Makefile)
[device "ahci0"]
driver = "ahci"

# Serial console
[chardev]
backend = "stdio"
id = "char0"

[device]
driver = "isa-serial"
chardev = "char0"
