# QEMU Configuration for Zonix OS — RISC-V 64 UEFI
#
# Usage: make qemu ARCH=riscv64

[machine]
type = "virt"

[memory]
size = "256M"

# System disk (GPT + ESP) on virtio-blk
[drive "sys"]
file = "bin/riscv64/zonix-uefi.img"
format = "raw"
if = "none"

[device "virtio-blk0"]
driver = "virtio-blk-pci"
drive = "sys"

# Display: ramfb (provides GOP for UEFI firmware)
[device "display"]
driver = "ramfb"

# Keyboard: virtio-keyboard-pci (GUI input)
[device "keyboard"]
driver = "virtio-keyboard-pci"
