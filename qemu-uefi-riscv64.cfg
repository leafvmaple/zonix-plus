# QEMU Configuration for Zonix OS — RISC-V 64 UEFI
#
# Usage: make qemu ARCH=riscv64

[machine]
type = "virt"

[memory]
size = "256M"

# virtio-blk: UEFI boot only (kernel has no virtio-blk driver yet)
[drive "sys"]
file = "bin/riscv64/zonix-uefi.img"
format = "raw"
if = "none"

[device "virtio-blk0"]
driver = "virtio-blk-pci"
drive = "sys"

# SDHCI: kernel-visible system disk (sd0), mirrors aarch64 boot layout
[drive "sdcard"]
file = "bin/riscv64/sdcard.img"
format = "raw"
if = "none"

[device "sdhci0"]
driver = "sdhci-pci"

[device "sd0"]
driver = "sd-card"
drive = "sdcard"

# Display: ramfb (provides GOP for UEFI firmware)
[device "display"]
driver = "ramfb"

# Keyboard: virtio-keyboard-pci (GUI input)
[device "keyboard"]
driver = "virtio-keyboard-pci"
