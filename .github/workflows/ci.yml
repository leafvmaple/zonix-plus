name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ======================================================================
  # Job 1: Code quality — formatting check
  # ======================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          CHANGED=0
          while IFS= read -r f; do
            if ! clang-format --dry-run -Werror "$f" 2>/dev/null; then
              echo "  Format error: $f"
              CHANGED=1
            fi
          done < <(find kernel/ arch/ -name '*.cpp' -o -name '*.h' -o -name '*.c')

          if [ "$CHANGED" -ne 0 ]; then
            echo ""
            echo "Formatting errors found. Run 'make format' to fix."
            exit 1
          fi
          echo "All source files are properly formatted."

  # ======================================================================
  # Job 2: Build x86 kernel (normal + test mode)
  # ======================================================================
  build-x86:
    name: Build x86
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld llvm nasm make \
            gcc-mingw-w64-x86-64 \
            gnu-efi \
            mtools dosfstools \
            fdisk

      - name: Build (normal)
        run: make ARCH=x86

      - name: Clean
        run: make clean ARCH=x86

      - name: Build (TEST=1)
        run: make ARCH=x86 TEST=1

  # ======================================================================
  # Job 3: Build aarch64 kernel
  # ======================================================================
  build-aarch64:
    name: Build aarch64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld llvm nasm make \
            gcc-mingw-w64-x86-64 \
            gnu-efi \
            mtools dosfstools \
            fdisk

      - name: Build kernel
        run: make ARCH=aarch64

  # ======================================================================
  # Job 4: Unit tests in QEMU (BIOS boot)
  # ======================================================================
  test-x86-bios:
    name: Test x86 (BIOS)
    runs-on: ubuntu-latest
    needs: build-x86
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld llvm nasm make \
            gcc-mingw-w64-x86-64 \
            gnu-efi \
            mtools dosfstools \
            fdisk \
            qemu-system-x86

      - name: Build with tests
        run: make ARCH=x86 TEST=1 bin/x86/zonix.img

      - name: Run BIOS boot tests
        run: |
          chmod +x scripts/ci_qemu_test.sh
          bash scripts/ci_qemu_test.sh bios

  # ======================================================================
  # Job 5: Unit tests in QEMU (UEFI boot)
  # ======================================================================
  test-x86-uefi:
    name: Test x86 (UEFI)
    runs-on: ubuntu-latest
    needs: build-x86
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld llvm nasm make \
            gcc-mingw-w64-x86-64 \
            gnu-efi \
            mtools dosfstools \
            fdisk \
            qemu-system-x86 \
            ovmf

      - name: Build with tests
        run: make ARCH=x86 TEST=1 bin/x86/zonix-uefi.img

      - name: Run UEFI boot tests
        run: |
          chmod +x scripts/ci_qemu_test.sh
          bash scripts/ci_qemu_test.sh uefi

  # ======================================================================
  # Job 6: Integration tests in QEMU (AArch64 UEFI boot)
  # ======================================================================
  test-aarch64-uefi:
    name: Test aarch64 (UEFI)
    runs-on: ubuntu-latest
    needs: build-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld llvm nasm make \
            gcc-mingw-w64-x86-64 \
            gnu-efi \
            mtools dosfstools \
            fdisk parted \
            qemu-system-arm \
            qemu-efi-aarch64

      - name: Build with tests
        run: make ARCH=aarch64 TEST=1 bin/aarch64/sdcard.img

      - name: Run aarch64 UEFI boot tests
        run: |
          chmod +x scripts/ci_qemu_test_aarch64.sh
          bash scripts/ci_qemu_test_aarch64.sh

  # ======================================================================
  # Job 7: Static analysis (clang-tidy, non-blocking)
  # ======================================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang clang-tidy llvm nasm make

      - name: Run clang-tidy
        run: |
          echo "Running clang-tidy on kernel sources..."
          ERRORS=0
          while IFS= read -r f; do
            if ! clang-tidy --quiet "$f" -- \
              -std=gnu++17 -ffreestanding -nostdinc -nostdinc++ \
              -Iinclude -Iarch/x86/include -Iarch/x86/kernel -Ikernel \
              -D__x86_64__ -DTEST_MODE=1 \
              2>/dev/null; then
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find kernel/ -name '*.cpp' | head -30)

          echo ""
          echo "clang-tidy found issues in $ERRORS file(s)."
          # Non-blocking: always exit 0
          exit 0
